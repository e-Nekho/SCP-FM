<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCP: FACILITY MANAGEMENT · ROADMAP</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Orbitron:wght@600;900&display=swap" rel="stylesheet">

<style>
/* ───────────── RESET ───────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ───────────── BODY / ФОН ───────────── */
body {
    min-height: 100vh;
    font-family: 'Syne', sans-serif;
    color: #dbdbdb;
    padding: 0 22px 60px;

    background-color: #0b0c10;
    background-image:
        radial-gradient(circle at 18% 28%, rgba(40,120,160,0.18) 0%, transparent 35%),
        radial-gradient(circle at 82% 72%, rgba(160,60,60,0.18) 0%, transparent 40%),
        repeating-linear-gradient(
            45deg,
            rgba(30,40,50,0.12) 0px,
            rgba(30,40,50,0.12) 2px,
            transparent 2px,
            transparent 6px
        );
}

/* ───────────── КОНТЕЙНЕР ───────────── */
.roadmap-container {
    max-width: 1100px;
    margin: auto;
    position: relative;
}

/* ───────────── ХЕДЕР ───────────── */
.top-header {
    display: flex;
    justify-content: center;
    gap: 26px;
    padding: 14px 0 10px;
    margin-bottom: 22px;

    text-transform: uppercase;
    font-weight: 700;
    letter-spacing: 2.5px;
    font-size: 0.85rem;

    background: rgba(10,15,20,0.75);
    border-bottom: 2px solid #5e7286;
}

.top-header a {
    color: #c9d7e6;
    text-decoration: none;
    padding: 4px 12px;
    background: #25303a;
    border-left: 3px solid #8fa1b4;
}

.top-header a:hover {
    background: #344351;
    color: #fff;
}

/* ───────────── ЗАГОЛОВОК ───────────── */
.game-title {
    font-weight: 800;
    font-size: clamp(2.2rem, 6.5vw, 3.8rem);
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #b8b2a0;

    border-left: 6px solid #bda273;
    padding-left: 16px;
    margin-bottom: 14px;
}

/* ───────────── ОПИСАНИЕ ───────────── */
.description-box {
    background: rgba(12,20,28,0.85);
    border: 1px solid #4f677e;
    border-top: 3px solid #7fa0ba;
    padding: 18px 22px;
    margin-bottom: 40px;

    font-size: 1rem;
    line-height: 1.45;
    color: #d0deed;
}

/* ───────────── ROADMAP ───────────── */
.roadmap-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
}

/* Вертикальная линия (центр по пунктам) */
.roadmap-grid::before {
    content: '';
    position: absolute;
    left: 130px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: repeating-linear-gradient(
        180deg,
        #6f8da8 0px,
        #6f8da8 6px,
        #2d4053 6px,
        #2d4053 12px
    );
    opacity: 0.35;
}

/* ───────────── СТРОКА ───────────── */
.roadmap-row {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 26px;
    align-items: center;
}

/* ДАТА */
.date-column {
    text-align: right;
    font-family: 'Orbitron', monospace;
    font-size: 0.95rem;
    color: #ff5a5a;
    text-shadow: 0 0 6px #900;
}

/* ───────────── ПУНКТ ───────────── */
.roadmap-item {
    background: rgba(22,30,38,0.95);
    padding: 12px 18px;
    border-left: 8px solid #6f8fa8;

    clip-path: polygon(0% 0%, 100% 0%, 97% 100%, 0% 100%);
    box-shadow: 6px 6px 0 #141e28, inset 0 0 0 1px #41576b;
    position: relative;
}

/* Скан-эффект */
.roadmap-item::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
        120deg,
        transparent 40%,
        rgba(180,220,255,0.08),
        transparent 60%
    );
    opacity: 0;
}

.roadmap-item:hover::after {
    animation: scan 0.8s linear;
}

@keyframes scan {
    from { opacity: 0; transform: translateX(-100%); }
    to   { opacity: 1; transform: translateX(100%); }
}

/* ───────────── КОНТЕНТ ───────────── */
.task-name {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 1px;
    color: #e8f0fa;
}

.task-status {
    margin-top: 4px;
    font-size: 0.85rem;
    letter-spacing: 1px;
    display: flex;
    justify-content: space-between;
}

/* ───────────── ПРОГРЕСС ───────────── */
.progress-bar-bottom {
    height: 4px;
    background: #2c3f50;
    margin-top: 8px;
}

.progress-fill-bottom {
    height: 100%;
    background: #b0c5da;
}

/* ───────────── СТАТУСЫ ───────────── */
.item-planned .roadmap-item { border-left-color: #6f8fa8; }
.item-wip .roadmap-item { border-left-color: #bf9f60; }
.item-ready .roadmap-item { border-left-color: #6dad8a; }
.item-canceled .roadmap-item { border-left-color: #aa6f6f; }

.item-ready .roadmap-item::before {
    content: "ARCHIVED";
    position: absolute;
    top: -10px;
    right: 14px;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: #7bd7a0;
}

/* ───────────── МОБИЛКА ───────────── */
@media (max-width: 720px) {
    .roadmap-row {
        grid-template-columns: 1fr;
    }
    .date-column {
        text-align: left;
        margin-left: 6px;
    }
    .roadmap-grid::before {
        left: 6px;
    }
}
</style>
</head>

<body>

<div class="roadmap-container">

    <div class="top-header">
        <a href="#">[ ЗОНА-19 ]</a>
        <a href="#">[ АРХИВ SCP ]</a>
        <a href="#">[ СОВЕТ O5 ]</a>
        <a href="#">[ РАСПОРЯЖЕНИЯ ]</a>
    </div>

    <div class="game-title">SCP ██: FACILITY MANAGEMENT</div>

    <div class="description-box">
        <strong>СТАТУС:</strong> ПЕРЕСБОРКА ЯДРА ·
        <span style="color:#e0c78c">КЛАСС ОБЪЕКТА: КЕТЕР</span><br><br>
        Дорожная карта отражает приоритеты Фонда по стабилизации аномалий
        и восстановлению процедур содержания на территории Зоны-19.
    </div>

    <div class="roadmap-grid" id="roadmapContainer"></div>

</div>

<script>
const tasks = [
    { name: "ОРГАНИЗАЦИЯ ПЕРВОНАЧАЛЬНОГО ЯДРА", status: 2, progress: 100, date: "14.02.2026" },
    { name: "СОЗДАНИЕ СИСТЕМЫ КОНФИГОВ", status: 1, progress: 20 },
    { name: "ПОДКЛЮЧЕНИЕ БД ПРОТОТИПОВ", status: 1, progress: 10 },
    { name: "...", status: 0, progress: 87 },
    { name: "...", status: 0, progress: 0 }
];

const statusClass = s =>
    s === 2 ? 'item-ready' :
    s === 1 ? 'item-wip' :
    s === 0 ? 'item-planned' : 'item-canceled';

const statusText = s =>
    s === 2 ? 'ГОТОВО' :
    s === 1 ? 'В РАЗРАБОТКЕ' :
    s === 0 ? 'В ПЛАНЕ' : 'ОТМЕНЕНО';

document.getElementById('roadmapContainer').innerHTML =
tasks.map(t => `
<div class="roadmap-row ${statusClass(t.status)}">
    <div class="date-column">${t.date ?? ''}</div>
    <div class="roadmap-item">
        <div class="task-name">${t.name}</div>
        <div class="task-status">
            <span>${statusText(t.status)}</span>
            <span>${t.progress}%</span>
        </div>
        <div class="progress-bar-bottom">
            <div class="progress-fill-bottom" style="width:${t.progress}%"></div>
        </div>
    </div>
</div>
`).join('');
</script>

</body>
</html>
